<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sealed Problems</title>
    <style>
      :root {
        --bg: #020617;
        --text-primary: rgba(255, 255, 255, 0.92);
        --text-secondary: rgba(255, 255, 255, 0.68);
        --border: rgba(255, 255, 255, 0.12);
        --panel: rgba(255, 255, 255, 0.05);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        color: var(--text-primary);
        background:
          radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15), transparent 40%),
          radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.12), transparent 40%),
          var(--bg);
      }
      .wrap { max-width: 1150px; margin: 0 auto; padding: 22px 16px 24px; }
      .glass {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        backdrop-filter: blur(16px);
        box-shadow: 0 16px 48px rgba(2, 6, 23, 0.55);
      }
      .head { padding: 18px; margin-bottom: 14px; }
      h1 { margin: 0; font-size: 24px; font-weight: 600; }
      .sub { margin-top: 8px; color: var(--text-secondary); font-size: 13px; }
      .toolbar {
        padding: 14px 18px;
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .status-dot {
        display: inline-block; width: 10px; height: 10px; border-radius: 50%;
        background: #f43f5e; margin-right: 8px;
      }
      .status-dot.ok { background: #34d399; }
      .btn {
        border: none; border-radius: 12px; padding: 9px 12px;
        color: #fff; font-weight: 600; cursor: pointer;
        background: linear-gradient(135deg, #a78bfa, #f472b6);
      }
      .list { padding: 10px; display: grid; gap: 10px; }
      .item { border: 1px solid var(--border); border-radius: 12px; padding: 12px; background: rgba(255,255,255,0.07); }
      .row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
      .k { font-size: 11px; color: var(--text-secondary); }
      .v { margin-top: 4px; font-size: 13px; font-weight: 600; word-break: break-word; }
      .desc { margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 8px; }
      @media (max-width: 860px) { .row { grid-template-columns: 1fr 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="glass head">
        <h1>Sealed Problems</h1>
        <div class="sub">Auto-captured runtime/dev errors appear here. No manual entry.</div>
      </div>

      <div class="glass toolbar">
        <div id="statusText"><span class="status-dot"></span>Disconnected</div>
        <button class="btn" id="refreshBtn" type="button">Refresh</button>
      </div>

      <div class="glass list" id="list"></div>
    </div>

    <script>
      const list = document.getElementById('list');
      const statusText = document.getElementById('statusText');
      const refreshBtn = document.getElementById('refreshBtn');

      async function loadProblems() {
        try {
          const res = await fetch('/api/problems?limit=500', { cache: 'no-store' });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const items = Array.isArray(data.items) ? data.items : [];

          statusText.innerHTML = '<span class="status-dot ok"></span>Connected - auto-refresh every 2s';
          if (!items.length) {
            list.innerHTML = '<div class="item"><div class="v">No auto-captured errors yet.</div></div>';
            return;
          }

          list.innerHTML = items
            .map((p) => `
              <div class="item">
                <div class="row">
                  <div><div class="k">When</div><div class="v">${p.when || ''}</div></div>
                  <div><div class="k">Where</div><div class="v">${p.where || ''}</div></div>
                  <div><div class="k">How</div><div class="v">${p.how || ''}</div></div>
                  <div><div class="k">Severity</div><div class="v">${p.severity || ''}</div></div>
                </div>
                <div class="desc">
                  <div class="k">Exact Error</div>
                  <div class="v">${String(p.error || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                </div>
              </div>
            `)
            .join('');
        } catch (e) {
          statusText.innerHTML = '<span class="status-dot"></span>Disconnected - start Sealed Problems server';
          list.innerHTML = `<div class="item"><div class="v">Unable to connect to /api/problems (${String(e)}).</div></div>`;
        }
      }

      refreshBtn.addEventListener('click', () => void loadProblems());
      void loadProblems();
      setInterval(() => void loadProblems(), 2000);
    </script>
  </body>
</html>
